MENU TITLE  === AFC-7 Intelligent Flight Controller Boot Menu ===
MENU BACKGROUND /splash_landscape.bmp
TIMEOUT 30
DEFAULT afc7-test

LABEL afc7-test
        MENU LABEL [1] Start AFC-7 Flight Control System (Custom DTB)
        KERNEL /Image.gz
        FDT /myb-afc7-2GB.dtb
        INITRD /st-image-resize-initrd
        APPEND root=PARTUUID=491f6117-415d-4f53-88c9-6e0de54deac6 rootwait rw earlyprintk earlycon loglevel=3 console=ttySTM0,115200

LABEL myb-stm32mp257x-2GB
        MENU LABEL [2] Start MYIR Default System (Safe Mode)
        KERNEL /Image.gz
        FDT /myb-stm32mp257x-2GB.dtb
        INITRD /st-image-resize-initrd
        APPEND root=PARTUUID=491f6117-415d-4f53-88c9-6e0de54deac6 rootwait rw earlyprintk earlycon loglevel=3 console=ttySTM0,115200

LABEL OpenSTLinux
        MENU LABEL [3] OpenSTLinux (Auto Match)
        KERNEL /Image.gz
        FDTDIR /
        INITRD /st-image-resize-initrd
        APPEND root=PARTUUID=491f6117-415d-4f53-88c9-6e0de54deac6 rootwait rw earlyprintk earlycon loglevel=3 console=ttySTM0,115200
